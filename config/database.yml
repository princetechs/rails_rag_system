# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("PG_USERNAME") { "sandipparida" } %>
  password: <%= ENV.fetch("PG_PASSWORD") { "devsan" } %>
  host: <%= ENV.fetch("PG_HOST") { "localhost" } %>

# Development environment

development:
  <<: *default
  database: rails_rag_system_development

# Test environment

test:
  <<: *default
  database: rails_rag_system_test

# Production environment

production:
  <<: *default
  database: rails_rag_system_production
  username: rails_rag_system
  password: <%= ENV['RAILS_RAG_SYSTEM_DATABASE_PASSWORD'] %>
